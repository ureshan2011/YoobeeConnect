<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yoobee Connect · Public Dashboard</title>
  <style>
    body { margin:0; font-family: Inter, -apple-system, sans-serif; background:#f8fafc; color:#0f172a; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 28px 16px 44px; display:grid; gap:14px; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:18px; padding:18px; box-shadow:0 14px 30px rgba(15,23,42,.06); }
    h1,h2 { margin:0; }
    .muted { color:#64748b; }
    .stats { display:grid; gap:10px; grid-template-columns: repeat(auto-fit,minmax(140px,1fr)); margin-top:10px; }
    .stat { background:#f8fafc; border:1px solid #e2e8f0; border-radius:14px; padding:10px; }
    .value { font-size:28px; font-weight:700; }
    .chart { width:100%; height:340px; }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Yoobee Connect · Public Student Dashboard</h1>
      <div class="muted" id="refreshStamp">Loading...</div>
      <div class="stats">
        <div class="stat"><div class="muted">Students</div><div id="students" class="value">0</div></div>
        <div class="stat"><div class="muted">Campuses</div><div id="campuses" class="value">0</div></div>
        <div class="stat"><div class="muted">Countries</div><div id="countries" class="value">0</div></div>
      </div>
    </section>
    <section class="card">
      <h2>Students by home country</h2>
      <div id="world" class="chart"></div>
    </section>
    <section class="card">
      <h2>Students by campus</h2>
      <div id="campus" class="chart"></div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/map/js/world.js"></script>
  <script>
    const BASE_URL = 'https://script.google.com/macros/s/AKfycbyGjR1PbKzZ1zv571z1Mo9LxK0Jr8Ck5uxx726wrChoXcL11wZ6Falf2VXJEM4RiLKi/exec';
    const mapChart = echarts.init(document.getElementById('world'));
    const campusChart = echarts.init(document.getElementById('campus'));

    async function load() {
      const response = await fetch(`${BASE_URL}?action=dashboard_summary`, { cache:'no-store' });
      const data = await response.json();
      if (!data.ok) throw new Error(data.error || 'Failed to load dashboard');

      document.getElementById('students').textContent = data.totalStudents || 0;
      document.getElementById('campuses').textContent = (data.campuses || []).length;
      document.getElementById('countries').textContent = (data.countries || []).length;
      document.getElementById('refreshStamp').textContent = `Refreshed: ${new Date().toLocaleString()}`;

      mapChart.setOption({
        visualMap: { min: 0, max: Math.max(5, ...(data.countries || []).map(c => c.count)), show: false, inRange: { color: ['#dbeafe', '#2563eb'] } },
        tooltip: { trigger: 'item', formatter: p => `${p.name}: ${p.value || 0}` },
        series: [{ type: 'map', map: 'world', roam: true, data: (data.countries || []).map(c => ({ name: c.name, value: c.count })) }]
      });

      campusChart.setOption({
        grid: { left: 44, right: 18, top: 20, bottom: 32 },
        xAxis: { type: 'value' },
        yAxis: { type: 'category', data: (data.campuses || []).map(c => c.name) },
        series: [{ type: 'bar', data: (data.campuses || []).map(c => c.count), itemStyle: { color: '#2563eb', borderRadius: [0,8,8,0] } }]
      });
    }

    window.addEventListener('resize', () => { mapChart.resize(); campusChart.resize(); });
    load().catch(err => { document.getElementById('refreshStamp').textContent = err.message; });
  </script>
</body>
</html>
